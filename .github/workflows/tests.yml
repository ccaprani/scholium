name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # -----------------------------------------------------------------------
      # System dependencies
      #   pandoc         — Markdown → Beamer PDF
      #   texlive-*      — pdflatex + Beamer class + recommended packages/fonts
      #   lmodern        — Type-1 Computer Modern (required by many Beamer themes)
      #   ffmpeg         — audio/video assembly and mp3 silent-clip generation
      #   poppler-utils  — pdftoppm used by pdf2image for PDF → PNG conversion
      # -----------------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            lmodern \
            ffmpeg \
            poppler-utils

      - name: Install Python package and dev dependencies
        run: pip install -e ".[dev]"

      # -----------------------------------------------------------------------
      # Unit tests — no external tools required, run first for fast feedback
      # -----------------------------------------------------------------------
      - name: Run unit tests
        run: pytest tests/ -m unit -v --tb=short

      # -----------------------------------------------------------------------
      # Integration tests — require pandoc, LaTeX, and ffmpeg (installed above)
      # -----------------------------------------------------------------------
      - name: Run integration tests
        run: pytest tests/ -m integration -v --tb=short
