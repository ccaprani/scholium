# Scholium Configuration
# Automated instructional video generation from markdown

# Slide settings
slide_marker: "[NEXT]"  # Marker for slide transitions in transcript
pandoc_template: "beamer"  # Pandoc template for slide generation

# TTS settings
# Available providers: piper, elevenlabs, coqui, openai, bark, f5tts, styletts2, tortoise
# Install with: pip install scholium[provider_name]
tts_provider: "elevenlabs"  # Default: piper (fast, free, local)
voice: "Xb7hH8MSUJpSbSDYk0k2" # Voice name (provider-specific)

# Piper TTS settings (recommended for getting started - FREE!)
# Install with: pip install scholium[piper]
# Voices download automatically from HuggingFace on first use
piper:
  voice: "en_US-lessac-medium"
  # Available voices:
  # - en_US-lessac-medium (male, clear)
  # - en_US-amy-medium (female, clear)
  # - en_US-ryan-medium (male)
  # - en_GB-alan-medium (British male)
  # - en_GB-alba-medium (British female)
  # More voices: https://huggingface.co/rhasspy/piper-voices

# Coqui TTS settings (recommended - FREE local voice cloning!)
# Install with: pip install scholium[coqui]
# Note: Requires Python 3.11 and has specific dependency versions
coqui:
  model: "tts_models/multilingual/multi-dataset/xtts_v2"  # XTTS v2 for voice cloning
  # Train voice with: scholium train-voice --name my_voice --provider coqui --sample audio.wav
  # Then use: scholium generate ... --provider coqui --voice my_voice

# ElevenLabs API settings (for highest quality)
# Install with: pip install scholium[elevenlabs]
# Requires API key from elevenlabs.io
#
# ⚠️  SECURITY WARNING: Do NOT store your API key in this file!
# Use environment variable instead: export ELEVENLABS_API_KEY="your_key"
elevenlabs:
  api_key: ""  # Leave empty - use ELEVENLABS_API_KEY environment variable
  model: "eleven_multilingual_v2"
  voice: "Xb7hH8MSUJpSbSDYk0k2"  # Alice - Clear, Engaging Educator
  # voice: ZGuEOd751j7qVTkXR73w # Colin

# OpenAI TTS settings
# Install with: pip install scholium[openai]
# Requires API key from platform.openai.com
#
# ⚠️  SECURITY WARNING: Do NOT store your API key in this file!
# Use environment variable instead: export OPENAI_API_KEY="your_key"
openai:
  api_key: ""  # Leave empty - use OPENAI_API_KEY environment variable
  model: "tts-1"  # Options: tts-1, tts-1-hd
  # Available voices: alloy, echo, fable, onyx, nova, shimmer

# Bark TTS settings (high quality, slow)
# Install with: pip install scholium[bark]
bark:
  model: "small"  # Options: small, medium, large

# F5-TTS settings (fast, high-quality local voice cloning)
# Install with: pip install scholium[f5tts]
# Requires a reference audio clip (5-15s); no training step needed
# Train voice with: scholium train-voice --name my_voice --provider f5tts --sample audio.wav
f5tts:
  model: "F5-TTS"       # Options: F5-TTS, E2-TTS
  vocoder: "vocos"       # Options: vocos, bigvgan
  # model_path: "my_voice/sample.wav"  # Reference audio, relative to voices_dir (or absolute)
  # ref_text: ""                        # Transcript of the reference clip (improves accuracy)

# StyleTTS2 settings (expressive local voice cloning with diffusion)
# Install with: pip install scholium[styletts2]
# Uses unofficial pip wrapper (pip install styletts2)
# Train voice with: scholium train-voice --name my_voice --provider styletts2 --sample audio.wav
styletts2:
  alpha: 0.3             # Speaking style blend (0=reference style, 1=model default)
  beta: 0.7              # Diffusion guidance strength
  diffusion_steps: 5     # More steps = slower but higher quality (5-20)
  # model_path: "my_voice/sample.wav"  # Reference audio, relative to voices_dir (or absolute)
  # For source install, set paths to your config and checkpoint:
  # model_config: "/path/to/StyleTTS2/Models/LJSpeech/config.yml"
  # model_checkpoint: "/path/to/StyleTTS2/Models/LJSpeech/epochs_2nd_00020.pth"

# Tortoise TTS settings (very high quality, slower local voice cloning)
# Install with: pip install scholium[tortoise]
# Zero-shot cloning from reference clips; no training required
# Train voice with: scholium train-voice --name my_voice --provider tortoise --sample audio.wav
# Tip: Add sample_2.wav, sample_3.wav etc. to the voice directory for better quality
tortoise:
  preset: "fast"         # Options: ultra_fast, fast, standard, high_quality
  kv_cache: true         # Enable KV caching for faster repeated inference
  half: true             # Use float16 to reduce VRAM usage (~8GB with half=true)
  # model_path: "my_voice/sample.wav"  # Reference audio, relative to voices_dir (or absolute)

# Video settings
resolution: [1920, 1080]  # Output resolution (width, height)
fps: 30  # Frames per second

# Paths
# Voice storage directory (stores Piper models and voice samples)
# Default: ~/.local/share/scholium/voices (system-wide, shared across projects)
# Override: "./voices" (project-specific, portable with project)
voices_dir: "~/.local/share/scholium/voices"
temp_dir: "./temp"  # Temporary files during generation
output_dir: "./output"  # Final video output

# Processing options
keep_temp_files: false  # Keep temporary files for debugging
verbose: true  # Show detailed progress

# Timing defaults (can be overridden per-slide in transcript)
timing:
  default_pre_delay: 2.0   # Default pause before speaking (seconds)
  default_post_delay: 1.0  # Default pause after speaking (seconds)
  min_slide_duration: 4.0  # Minimum duration for any slide (seconds)
  silent_slide_duration: 3.0  # Duration for silent TOC/section slides
